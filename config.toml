# CoCai configuration
# Non-secret settings — safe to commit to git.
# API keys go in .env (see .env.example), which is git-ignored.

[llm]
# Any OpenAI-compatible endpoint: OpenAI, Together AI, Groq, OpenRouter, local vLLM, etc.
api_base = "https://openrouter.ai/api/v1"
model    = "arcee-ai/trinity-large-preview:free"

[embedding]
api_base = "https://api.voyageai.com/v1"
model    = "voyage-4-lite"
# Dimensions must match the chosen model (or the truncated size if output_dimension is set).
# voyage-4-lite = 1024 (default), supports truncation to 256 / 512 / 1024 / 2048
# voyage-4 = 1024 (default)
# text-embedding-3-small = 1536, text-embedding-3-large = 3072, text-embedding-ada-002 = 1536
dims     = 1024

[vector_store]
# Local ChromaDB persistence directory (created automatically on first run).
path           = ".data/chroma"
rag_collection = "game_module"   # RAG index for game module documents
mem_collection = "cocai"         # Mem0 episodic memory

[memory]
enabled = true
# Set to false to disable Mem0 and fall back to in-process chat history.

[tracing]
enabled = false
# If true, send OpenTelemetry traces to an Arize Phoenix instance.
# Start Phoenix with: uv run phoenix serve  (no Docker required)
# endpoint = "http://localhost:4317"

[game_module]
path        = "game_modules/Clean-Up-Aisle-Four"
preread     = false   # Pre-summarise the module on startup (slow, but better context)
reuse_index = true    # Reuse existing ChromaDB index if present

[image_generation]
# Image generation via any OpenAI-compatible images/generations endpoint.
# Uses the same api_base and LLM_API_KEY as [llm] by default.
enabled = true
model   = "bytedance-seed/seedream-4.5"

[auto_update]
history = true   # Summarise story history after each exchange (background task)
scene   = true   # Auto-illustrate scene when setting significantly changes
